name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-dev \
            python3-pip \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libffi-dev \
            libssl-dev \
            ninja-build \
            ccache \
            unzip \
            openjdk-17-jdk

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython pillow

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV

      - name: Setup Android SDK
        run: |
          export ANDROIDSDK=$HOME/android-sdk
          mkdir -p $ANDROIDSDK
          
          if [ ! -d "$ANDROIDSDK/cmdline-tools/latest" ]; then
            cd $HOME
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mkdir -p $ANDROIDSDK/cmdline-tools
            mv cmdline-tools $ANDROIDSDK/cmdline-tools/latest
            rm cmdline-tools.zip
          fi
          
          yes | $ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" || true
          
          echo "ANDROIDSDK=$ANDROIDSDK" >> $GITHUB_ENV
          echo "ANDROIDNDK=$HOME/android-ndk" >> $GITHUB_ENV
          echo "ANDROIDAPI=34" >> $GITHUB_ENV
          echo "ANDROIDMINAPI=21" >> $GITHUB_ENV

      - name: Download and setup Android NDK
        run: |
          export ANDROIDNDK=$HOME/android-ndk
          
          if [ ! -d "$ANDROIDNDK/toolchains/llvm/prebuilt/linux-x86_64" ]; then
            cd $HOME
            wget --timeout=300 -q https://dl.google.com/android/repository/android-ndk-r27d-linux.zip -O android-ndk.zip
            unzip -q android-ndk.zip
            mv android-ndk-r27d $ANDROIDNDK
            rm android-ndk.zip
          fi

      - name: Build with buildozer
        run: |
          export ANDROIDSDK=$HOME/android-sdk
          export ANDROIDNDK=$HOME/android-ndk
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          
          cd ${{ github.workspace }}
          buildozer android debug --yes 2>&1 | tee build.log

      - name: List build outputs
        run: |
          ls -la ${{ github.workspace }}/bin/ 2>/dev/null || echo "No bin directory"
          find ${{ github.workspace }} -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvboxmanager-debug.apk
          path: bin/*.apk
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
